<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأثير كتابة النص</title>
    <style>
        .header-product {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            padding: 60px 0;
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .Main-pro {
            max-width: 800px;
            margin: 0 auto;
        }

        /* تنسيق العنوان */
        .Main-pro h2 {
            font-size: 42px;
            margin-bottom: 20px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            min-height: 120px; /* مساحة للعنوان */
            line-height: 1.4;
        }

        /* تنسيق الفقرة */
        .Main-pro p {
            font-size: 24px;
            opacity: 0.9;
            min-height: 80px; /* مساحة للفقرة */
            line-height: 1.6;
        }

        /* مؤشر الكتابة (الCursor) */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 40px;
            background-color: white;
            margin-right: 5px;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* زر إعادة التشغيل */
        .restart-btn {
            margin-top: 30px;
            padding: 12px 30px;
            background: white;
            color: #ff6b6b;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        /* تأثير ظهور أولي */
        .header-product {
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="header-product">
    <div class="container">
        <div class="Main-pro">
            <h2 id="typingTitle"></h2>
            <p id="typingParagraph"></p>
            <button class="restart-btn" onclick="restartTyping()">🔄 إعادة الكتابة</button>
        </div>
    </div>
</div>

<script>
// النصوص المراد كتابتها
const titleText = "طعم البيتزا الأصلي… زي ما بتحبه بطعم إيطالي أصيل";
const paragraphText = "تجربة بيتزا إيطالية بمذاق غني وجودة تفرق من أول قضمة.";

// العناصر
const titleElement = document.getElementById('typingTitle');
const paragraphElement = document.getElementById('typingParagraph');

// متغيرات التحكم
let titleIndex = 0;
let paragraphIndex = 0;
let isTitleDone = false;

// ===== الطريقة الأولى: كتابة العنوان أولاً ثم الفقرة =====
function typeWriter() {
    // كتابة العنوان
    if (titleIndex < titleText.length) {
        titleElement.innerHTML = titleText.substring(0, titleIndex + 1) + '<span class="cursor"></span>';
        titleIndex++;
        setTimeout(typeWriter, 100); // سرعة الكتابة (100ms لكل حرف)
    } 
    // بعد الانتهاء من العنوان، ابدأ بكتابة الفقرة
    else if (!isTitleDone) {
        isTitleDone = true;
        // إزالة المؤشر من العنوان
        titleElement.innerHTML = titleText;
        // بدء كتابة الفقرة
        typeParagraph();
    }
}

// كتابة الفقرة
function typeParagraph() {
    if (paragraphIndex < paragraphText.length) {
        paragraphElement.innerHTML = paragraphText.substring(0, paragraphIndex + 1) + '<span class="cursor"></span>';
        paragraphIndex++;
        setTimeout(typeParagraph, 70); // سرعة أسرع للفقرة
    } else {
        // إزالة المؤشر بعد الانتهاء
        paragraphElement.innerHTML = paragraphText;
    }
}

// ===== الطريقة الثانية: كتابة النص حرف بحرف مع تفاصيل أكثر =====
function typeWriterAdvanced() {
    // تفريغ العناصر
    titleElement.innerHTML = '';
    paragraphElement.innerHTML = '';
    
    let i = 0;
    const fullText = titleText + '|' + paragraphText; // دمج النصين
    const targetElement = titleElement; // نبدأ بالعنوان
    
    function typeCharacter() {
        if (i < fullText.length) {
            if (fullText[i] === '|') {
                // عند الوصول للفاصل، ننتقل للفقرة
                titleElement.innerHTML = titleText;
                i++;
                typeParagraphAdvanced();
            } else {
                titleElement.innerHTML = fullText.substring(0, i + 1) + '<span class="cursor"></span>';
                i++;
                setTimeout(typeCharacter, 100);
            }
        }
    }
    
    function typeParagraphAdvanced() {
        if (paragraphIndex < paragraphText.length) {
            paragraphElement.innerHTML = paragraphText.substring(0, paragraphIndex + 1) + '<span class="cursor"></span>';
            paragraphIndex++;
            setTimeout(typeParagraphAdvanced, 70);
        } else {
            paragraphElement.innerHTML = paragraphText;
        }
    }
    
    typeCharacter();
}

// ===== الطريقة الثالثة: كتابة كل حرف على حدة مع تأثيرات =====
function typeWriterWithEffects() {
    // تفريغ العناصر
    titleElement.innerHTML = '';
    paragraphElement.innerHTML = '';
    
    let titlePos = 0;
    let paraPos = 0;
    
    // كتابة العنوان حرف حرف
    function writeTitle() {
        if (titlePos < titleText.length) {
            const char = titleText[titlePos];
            const span = document.createElement('span');
            span.textContent = char;
            span.style.opacity = '0';
            span.style.animation = 'fadeInChar 0.3s ease forwards';
            titleElement.appendChild(span);
            
            // إضافة المؤشر بعد آخر حرف
            if (titlePos === titleText.length - 1) {
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                cursor.style.animation = 'blink 0.7s infinite';
                titleElement.appendChild(cursor);
            }
            
            titlePos++;
            setTimeout(writeTitle, 120);
        } else {
            // بعد العنوان، ابدأ الفقرة
            setTimeout(writeParagraph, 500);
        }
    }
    
    // كتابة الفقرة حرف حرف
    function writeParagraph() {
        if (paraPos < paragraphText.length) {
            const char = paragraphText[paraPos];
            const span = document.createElement('span');
            span.textContent = char;
            span.style.opacity = '0';
            span.style.animation = 'fadeInChar 0.2s ease forwards';
            paragraphElement.appendChild(span);
            
            // إضافة المؤشر
            if (paraPos === paragraphText.length - 1) {
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                cursor.style.animation = 'blink 0.7s infinite';
                paragraphElement.appendChild(cursor);
            }
            
            paraPos++;
            setTimeout(writeParagraph, 50);
        }
    }
    
    writeTitle();
}

// ===== الطريقة الرابعة: الأبسط والأكثر استخداماً =====
function simpleTypeWriter() {
    // إعادة تعيين القيم
    titleIndex = 0;
    paragraphIndex = 0;
    isTitleDone = false;
    
    // تفريغ العناصر
    titleElement.innerHTML = '';
    paragraphElement.innerHTML = '';
    
    // بدء الكتابة
    typeWriter();
}

// ===== إعادة تشغيل التأثير =====
function restartTyping() {
    // إعادة تعيين القيم
    titleIndex = 0;
    paragraphIndex = 0;
    isTitleDone = false;
    
    // تفريغ العناصر
    titleElement.innerHTML = '';
    paragraphElement.innerHTML = '';
    
    // اختيار الطريقة التي تريدها:
    simpleTypeWriter(); // الأبسط
    // typeWriterAdvanced(); // المتقدمة
    // typeWriterWithEffects(); // مع تأثيرات
}

// ===== إضافة تأثيرات CSS إضافية عبر JavaScript =====
const style = document.createElement('style');
style.textContent = `
    @keyframes fadeInChar {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .Main-pro h2 span, .Main-pro p span {
        display: inline-block;
        animation: fadeInChar 0.3s ease forwards;
    }
`;
document.head.appendChild(style);

// ===== بدء التأثير عند تحميل الصفحة =====
document.addEventListener('DOMContentLoaded', function() {
    // تأخير بسيط قبل البدء
    setTimeout(() => {
        simpleTypeWriter();
    }, 500);
});

// ===== نسخة مطورة مع إمكانية التحكم بالسرعة =====
class TypeWriter {
    constructor(element, text, speed = 100, delay = 0) {
        this.element = element;
        this.text = text;
        this.speed = speed;
        this.delay = delay;
        this.index = 0;
        this.isDone = false;
    }
    
    start() {
        setTimeout(() => {
            this.type();
        }, this.delay);
    }
    
    type() {
        if (this.index < this.text.length) {
            this.element.innerHTML = this.text.substring(0, this.index + 1) + '<span class="cursor"></span>';
            this.index++;
            setTimeout(() => this.type(), this.speed);
        } else {
            this.isDone = true;
            this.element.innerHTML = this.text;
        }
    }
}

// استخدام الكلاس المتطور
function advancedTyping() {
    const titleWriter = new TypeWriter(titleElement, titleText, 120, 0);
    const paragraphWriter = new TypeWriter(paragraphElement, paragraphText, 70, titleText.length * 120 + 200);
    
    titleWriter.start();
    paragraphWriter.start();
}

// يمكنك استخدام advancedTyping() بدلاً من simpleTypeWriter()
</script>

<!-- نسخة احتياطية مع خيارات متعددة -->
<div style="text-align: center; margin: 20px;">
    <button class="restart-btn" onclick="simpleTypeWriter()">🔄 كتابة عادية</button>
    <button class="restart-btn" onclick="advancedTyping()">✨ كتابة متطورة</button>
    <button class="restart-btn" onclick="typeWriterWithEffects()">🌟 مع تأثيرات</button>
</div>

</body>
</html>
